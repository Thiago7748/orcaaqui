<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrçaAqui - Conectando Clientes e Fornecedores</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Font Inter para leitura B2B -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="header-main">
        <div class="container header-container">
            <h1 class="header-title">OrçaAqui</h1>
            <nav>
                <a href="#" class="header-link">Sobre</a>
            </nav>
        </div>
    </header>

    <!-- Nova Hero Section inspirada na VF Engenharia -->
    <section class="hero-section">
        <div class="container hero-content">
            <h2 class="hero-title">Forneça seus materiais de forma rápida e sem burocracia</h2>
            <p class="hero-subtitle">Veja o que precisamos hoje, dê o seu match e faça negócios pelo WhatsApp.</p>
            <a href="#pedidos" class="btn btn-primary hero-btn">Ver Pedidos em Aberto ↓</a>
        </div>
    </section>

    <!-- Grid de Pedidos -->
    <main id="pedidos" class="container main-content">
        <div class="section-title-container">
            <h3>Pedidos em Aberto</h3>
        </div>
        
        <div id="orders-container" class="orders-grid">
            <!-- Os pedidos serão renderizados aqui automaticamente pelo JS -->
        </div>
    </main>

    <!-- Modal de Proposta -->
    <div id="bid-modal" class="modal-overlay modal-hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Enviar Orçamento</h2>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </header>
            <div class="modal-body">
                <div class="modal-order-details">
                    <h3>Detalhes do Pedido</h3>
                    <div id="modal-order-info" class="modal-info-box"></div>
                </div>
                <div class="modal-bid-form">
                    <h3>Sua Proposta</h3>
                    <form id="form-bid">
                        <input type="hidden" id="bid-order-id">
                        <div class="form-group">
                            <label for="bid-nome">Sua Empresa / Nome</label>
                            <input type="text" id="bid-nome" placeholder="Ex: Marcenaria do João" minlength="2" maxlength="100" required>
                        </div>
                        <div class="form-group">
                            <label for="bid-whats">WhatsApp de Contato</label>
                            <!-- Pattern para forçar no mínimo 10 dígitos (com a máscara) -->
                            <input type="tel" id="bid-whats" placeholder="(11) 99999-9999" pattern=".{14,15}" title="Digite um telefone válido com DDD. Ex: (11) 99999-9999" maxlength="15" required>
                        </div>
                        <div class="form-group">
                            <label for="bid-value">Preço Ofertado (R$)</label>
                            <!-- Step 0.01 permite centavos, min 0.01 impede valores zerados ou negativos -->
                            <input type="number" step="0.01" min="0.01" id="bid-value" placeholder="Ex: 1500.00" required>
                        </div>
                        <div class="form-group">
                            <label for="bid-obs">Observações (Material, Condições)</label>
                            <textarea id="bid-obs" rows="3" placeholder="Descreva o que está ofertando para bater com os requisitos..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit-bid">Enviar Proposta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Container de Notificações (Toast) -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
